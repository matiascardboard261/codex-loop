name: "Setup Release Tools"
description: "Sets up GoReleaser, git-cliff, Syft, and Cosign for codex-loop releases"

inputs:
  goreleaser-version:
    description: "GoReleaser version to install"
    required: false
    default: "latest"
  goreleaser-distribution:
    description: "GoReleaser distribution"
    required: false
    default: "goreleaser"
  git-cliff-version:
    description: "git-cliff version to install"
    required: false
    default: "2.7.0"
  cosign-version:
    description: "Cosign version to install"
    required: false
    default: "v2.2.4"

outputs:
  goreleaser-version:
    description: "The GoReleaser version that was installed"
    value: ${{ steps.setup-goreleaser.outputs.version }}
  git-cliff-version:
    description: "The git-cliff version that was installed"
    value: ${{ steps.setup-git-cliff.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Setup git-cliff
      id: setup-git-cliff
      uses: ./.github/actions/setup-git-cliff
      with:
        version: ${{ inputs.git-cliff-version }}

    - name: Setup GoReleaser
      id: setup-goreleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: ${{ inputs.goreleaser-distribution }}
        version: ${{ inputs.goreleaser-version }}
        install-only: true

    - name: Setup Syft for SBOM generation
      uses: anchore/sbom-action/download-syft@v0

    - name: Setup Cosign for artifact signing
      uses: sigstore/cosign-installer@v3
      with:
        cosign-release: ${{ inputs.cosign-version }}

    - name: Verify release tools
      shell: bash
      run: |
        set -euo pipefail
        go version
        git-cliff --version
        goreleaser --version
        syft version
        cosign version
