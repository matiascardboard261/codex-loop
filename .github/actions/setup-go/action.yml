name: "Setup Go Environment"
description: "Sets up Go with module caching for codex-loop"

inputs:
  go-version:
    description: "Go version to install"
    required: false
    default: "1.24.x"
  cache:
    description: "Cache Go modules"
    required: false
    default: "true"

outputs:
  go-version:
    description: "The Go version that was installed"
    value: ${{ steps.setup-go.outputs.go-version }}

runs:
  using: "composite"
  steps:
    - name: Set up Go
      id: setup-go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: ${{ inputs.cache }}

    - name: Download Go modules
      shell: bash
      run: |
        set -euo pipefail
        go mod download
        go mod verify
